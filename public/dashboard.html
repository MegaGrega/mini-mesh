<!DOCTYPE html>
<html>
<head>
    <title>MINI MESH | DASHBOARD</title>
    <style>
        :root {
            --sidebar-target-width: 35%; 
        }

        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        /* Sidebar: 2x2 Grid of Node Views */
        #node-sidebar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1.5vw; 
            padding: 0;
            width: 0; 
            height: 100vh;
            background: #080808;
            box-sizing: border-box;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1), padding 0.6s;
            overflow: hidden; 
            z-index: 50;
        }

        #node-sidebar.active {
            width: var(--sidebar-target-width);
            padding: 20px;
            border-right: 2px solid #222;
        }

        /* Control Bar (Button + Toggle) */
        #controls {
            position: absolute; top: 25px; left: 25px; z-index: 1100;
            display: flex; align-items: center; gap: 15px;
            transition: left 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #toggle-btn {
            background: rgba(10, 10, 10, 0.9);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 10px 18px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        #toggle-btn:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        .switch-label {
            color: #00ffcc; font-size: 9px; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(0,0,0,0.8); padding: 9px 12px; border: 1px solid #333;
            text-transform: uppercase;
        }

        /* Main Global Focus Area */
        #global-focus {
            flex-grow: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }

        .square-wrapper {
            height: 90vh; 
            aspect-ratio: 1 / 1;
            position: relative;
        }

        .frame-container {
            position: relative;
            background: #050505;
            border: 1px solid #1a1a1a;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .label {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.85); padding: 4px 10px;
            font-size: 10px; color: #555; z-index: 10;
            pointer-events: none; border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="toggle-btn" onclick="toggleSidebar()">Monitor Nodes</button>
        <label class="switch-label">
            <input type="checkbox" id="ghost-toggle" onchange="syncGhosting()">
            Toggle Ghosting
        </label>
    </div>

    <div id="node-sidebar">
        <div class="frame-container"><div class="label">TL_Sim</div><iframe src="/?zone=TOP_LEFT"></iframe></div>
        <div class="frame-container"><div class="label">TR_Sim</div><iframe src="/?zone=TOP_RIGHT"></iframe></div>
        <div class="frame-container"><div class="label">BL_Sim</div><iframe src="/?zone=BOTTOM_LEFT"></iframe></div>
        <div class="frame-container"><div class="label">BR_Sim</div><iframe src="/?zone=BOTTOM_RIGHT"></iframe></div>
    </div>

    <div id="global-focus">
        <div class="square-wrapper">
            <div class="frame-container">
                <div class="label" style="color: #00ffcc; border-color: #00ffcc;">Universal_Replication_Layer</div>
                <iframe src="/"></iframe>
            </div>
        </div>
    </div>

    <script>
        function syncGhosting() {
            const isEnabled = document.getElementById('ghost-toggle').checked;
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(frame => {
                frame.contentWindow.postMessage({ type: 'toggle_ghosting', value: isEnabled }, '*');
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('node-sidebar');
            const controls = document.getElementById('controls');
            const btn = document.getElementById('toggle-btn');
            
            sidebar.classList.toggle('active');
            
            if (sidebar.classList.contains('active')) {
                btn.innerText = 'Hide Monitors';
                controls.style.left = 'calc(35% + 20px)'; 
            } else {
                btn.innerText = 'Monitor Nodes';
                controls.style.left = '25px';
            }
        }
    </script>
</body>
</html>
